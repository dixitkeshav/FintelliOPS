# Production stack: Next.js + Django (Daphne) + Redis + Celery + Postgres
#
# Usage:
#   cp .env.production.example .env.production
#   # fill in API keys and secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# App:     http://localhost:3000
# API:     http://localhost:8000
# WebSocket: ws://localhost:8000/ws/dashboard/

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintelli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintelli}
      POSTGRES_DB: ${POSTGRES_DB:-fintelli}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fintelli} -d ${POSTGRES_DB:-fintelli}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DJANGO_DEBUG: 'False'
      DJANGO_DB_PATH: /app/backend/data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-http://localhost:3000}
    volumes:
      - backend_data:/app/backend/data
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ['celery', '-A', 'config', 'worker', '-l', 'info']
    env_file:
      - .env.production
    environment:
      DJANGO_DEBUG: 'False'
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ['celery', '-A', 'config', 'beat', '-l', 'info']
    env_file:
      - .env.production
    environment:
      DJANGO_DEBUG: 'False'
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintelli}:${POSTGRES_PASSWORD:-fintelli}@postgres:5432/${POSTGRES_DB:-fintelli}?schema=public
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  backend_data:
