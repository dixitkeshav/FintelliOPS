# Local Postgres + Redis for EDGE (Next.js + Prisma + tick buffering)
# Usage: docker compose -f docker-compose.edge.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: edge-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: edge
      POSTGRES_PASSWORD: edge
      POSTGRES_DB: edge
    volumes:
      - edge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edge -d edge']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edge-redis
    ports:
      - '6379:6379'
    volumes:
      - edge_redis:/data

volumes:
  edge_pgdata:
  edge_redis:
