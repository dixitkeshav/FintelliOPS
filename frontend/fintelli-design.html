<html><head><style>
[data-theme="light"]{--bg-page:#F7F6F3;--bg-surface:#FFFFFF;--bg-raised:#FDFCFB;--bg-inset:#F0EEE9;--bg-hover:#E9E7E1;--bg-glass:rgba(255,255,255,0.75);--border:rgba(0,0,0,0.07);--border-md:rgba(0,0,0,0.12);--text-1:#0F0E0D;--text-2:#3A3733;--text-3:#78736C;--text-4:#ABA49C;--accent:#1558EE;--accent-soft:rgba(21,88,238,0.09);--accent-mid:rgba(21,88,238,0.18);--accent-glow:rgba(21,88,238,0.28);--green:#047857;--green-soft:rgba(4,120,87,0.09);--red:#C91B1B;--red-soft:rgba(201,27,27,0.08);--amber:#B45309;--amber-soft:rgba(180,83,9,0.09);--purple:#6D28D9;--purple-soft:rgba(109,40,217,0.08);--sh-sm:0 1px 3px rgba(0,0,0,0.06);--sh-md:0 4px 16px rgba(0,0,0,0.08);--sh-lg:0 12px 40px rgba(0,0,0,0.1);--sh-xl:0 24px 64px rgba(0,0,0,0.13);--sh-acc:0 6px 28px rgba(21,88,238,0.22);--sidebar:#FFFFFF;--topbar:rgba(247,246,243,0.94)}
[data-theme="dark"]{--bg-page:#07090E;--bg-surface:#0C0F19;--bg-raised:#101420;--bg-inset:#080B14;--bg-hover:#181D2E;--bg-glass:rgba(12,15,25,0.82);--border:rgba(255,255,255,0.055);--border-md:rgba(255,255,255,0.10);--text-1:#EDF0F8;--text-2:#ACB6CC;--text-3:#606880;--text-4:#363D55;--accent:#3B82F6;--accent-soft:rgba(59,130,246,0.12);--accent-mid:rgba(59,130,246,0.22);--accent-glow:rgba(59,130,246,0.38);--green:#10B981;--green-soft:rgba(16,185,129,0.12);--red:#F03E3E;--red-soft:rgba(240,62,62,0.12);--amber:#F59E0B;--amber-soft:rgba(245,158,11,0.12);--purple:#8B5CF6;--purple-soft:rgba(139,92,246,0.12);--sh-sm:0 1px 3px rgba(0,0,0,0.35);--sh-md:0 4px 16px rgba(0,0,0,0.45);--sh-lg:0 12px 40px rgba(0,0,0,0.55);--sh-xl:0 24px 64px rgba(0,0,0,0.65);--sh-acc:0 6px 28px rgba(59,130,246,0.35);--sidebar:#0C0F19;--topbar:rgba(7,9,14,0.94)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--text-1);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
.up{color:var(--green)}.dn{color:var(--red)}
.dash-layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:218px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100}
.sidebar.coll{width:58px}
.sb-head{height:58px;display:flex;align-items:center;gap:9px;padding:0 15px;border-bottom:1px solid var(--border)}
.sb-logo-icon{width:29px;height:29px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:800}
.sb-brand{font-family:'Instrument Serif',serif;font-size:15.5px;color:var(--text-1)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 7px}
.sb-sec-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--text-4);padding:12px 8px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;color:var(--text-3);font-size:13px;margin-bottom:1px;border:1px solid transparent;text-decoration:none}
.sb-item:hover{background:var(--bg-hover);color:var(--text-1)}
.sb-item.act{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-mid);font-weight:500}
.topbar{height:58px;background:var(--topbar);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.dash-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.dash-content{flex:1;overflow-y:auto;padding:22px;background:var(--bg-page)}
.pg-title{font-family:'Instrument Serif',serif;font-size:25px;color:var(--text-1);margin-bottom:3px}
.pg-sub{font-size:13px;color:var(--text-3)}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.ct{font-size:13px;font-weight:600;color:var(--text-1)}
.cb{padding:18px}
.mc{background:var(--bg-surface);border:1px solid var(--border);border-radius:13px;padding:18px}
.mc-lbl{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text-3);margin-bottom:9px}
.mc-val{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:600;color:var(--text-1)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row{display:flex;gap:14px}
.f1{flex:1;min-width:0}
.mb14{margin-bottom:14px}
.btn-pri{padding:7px 18px;border-radius:9px;background:var(--accent);font-size:13px;font-weight:600;color:#fff;border:none;cursor:pointer}
.finput{width:100%;background:var(--bg-surface);border:1px solid var(--border-md);border-radius:9px;padding:10px 13px;font-size:13.5px;color:var(--text-1);font-family:'DM Sans',sans-serif}
.flabel{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:7px;display:block}
.dtable{width:100%;border-collapse:collapse;font-size:12.5px}
.dtable th{text-align:left;padding:9px 13px;font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)}
.dtable td{padding:10px 13px;border-bottom:1px solid var(--border)}
.tag-pos{background:var(--green-soft);color:var(--green)}
.tag-neg{background:var(--red-soft);color:var(--red)}
.tag-neu{background:var(--accent-soft);color:var(--accent)}
.tag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.badge-gr{background:var(--green-soft);color:var(--green)}
.badge-rd{background:var(--red-soft);color:var(--red)}
.badge-bl{background:var(--accent-soft);color:var(--accent)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.ticker-strip{height:34px;background:var(--bg-surface);border-top:1px solid var(--border);overflow:hidden}
.ticker-track{display:flex;animation:tick-scroll 28s linear infinite}
@keyframes tick-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{display:flex;align-items:center;gap:7px;padding:0 18px;border-right:1px solid var(--border);font-family:'JetBrains Mono'}
.theme-dock{position:fixed;top:50%;right:18px;transform:translateY(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px}
.tdock-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--border-md);background:var(--bg-surface);cursor:pointer;display:flex;align-items:center;justify-content:center}
.tdock-btn.on{background:var(--accent);color:#fff}
</style></head><body></body></html>
